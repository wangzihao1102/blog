{% extends "base.html" %}
{% block title %}归档 - 我的博客{% endblock %}

{% block content %}
<header class="categories-header">
    <h1>文章归档</h1>
</header>

<div class="categories-list">
    {% for year in years %}
    <details class="category-year" open>
        <summary>{{ year }}年</summary>
        <div class="category-months">
            {% for month in range(1, 13) %}
                {% set posts = [] %}
                <!-- We'll just show months that have posts -->
                <a href="{{ url_for('public.archive', year=year, month=month) }}" class="month-link">
                    {{ month }}月
                </a>
            {% endfor %}
        </div>
    </details>
    {% endfor %}
</div>
{% endblock %}
